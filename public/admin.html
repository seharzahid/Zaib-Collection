<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel - Zaib Collection</title>
    <style>
        body { font-family: sans-serif; background-color: #fcfbf9; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; display: flex; gap: 20px; }
        .form-box { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); flex: 1; }
        .manage-box { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); flex: 1; }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background-color: #5c8091; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .prod-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .btn-del { background: #ef4444; color: white; width: auto; padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Add Product Form -->
        <div class="form-box">
            <h2>Add New Article</h2>
            <form action="/api/products" method="POST" enctype="multipart/form-data">
                <input type="text" name="name" placeholder="Product Name" required>
                <select name="category">
                    <option value="women">Women Collection</option>
                    <option value="men">Men Collection</option>
                    <option value="kids">Kids Wear</option>
                    <option value="jewelry">Jewelry</option>
                </select>
                
                <!-- Status Tags Selection -->
                <select name="statusTag">
                    <option value="normal">Normal (No Tag)</option>
                    <option value="sale">On Sale</option>
                    <option value="soldout">Sold Out</option>
                </select>

                <input type="number" name="price" placeholder="Current Price (Rs.)" required>
                <input type="number" name="oldPrice" placeholder="Old Price (Rs.) - Leave empty if not on sale">
                <textarea name="details" placeholder="Product Details..."></textarea>
                <input type="file" name="images" multiple required>
                <button type="submit">Upload Product</button>
            </form>
        </div>

        <!-- Delete / Manage Products List -->
        <div class="manage-box">
            <h2>Manage Live Articles</h2>
            <div id="admin-prod-list"></div>
        </div>
    </div>

    <script>
        async function fetchAdminProducts() {
            const res = await fetch('/api/products');
            const data = await res.json();
            const listDiv = document.getElementById('admin-prod-list');
            listDiv.innerHTML = '';
            data.forEach(p => {
                listDiv.innerHTML += `
                    <div class="prod-item">
                        <span><strong>${p.name}</strong> (${p.category}) - Rs.${p.price}</span>
                        <button class="btn-del" onclick="deleteProduct('${p.id}')">Delete</button>
                    </div>
                `;
            });
        }
        async function deleteProduct(id) {
    if (!confirm("Are you sure you want to delete this product?")) return;

    try {
        const response = await fetch(`/api/products/${id}`, {
            method: 'DELETE'
        });
        const result = await response.json();
        if (result.success) {
            alert("Product deleted successfully!");
            fetchAdminProducts(); // List refresh karne ke liye (Aap ke function ka naam fetchAdminProducts hai)
        } else {
            alert("Error deleting product: " + result.error);
        }
    } catch (err) {
        console.error("Delete Error:", err);
    }
}
        window.onload = fetchAdminProducts;
    </script>
</body>
</html>
